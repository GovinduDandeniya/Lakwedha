name: Full System CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─── Backend ──────────────────────────────────────────────
  backend:
    name: Backend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      PORT: 5000
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - name: Start server check
        run: |
          node src/server.js &
          sleep 10
          echo "Server started successfully"

  # ─── Web (Next.js) ────────────────────────────────────────
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  # ─── Doctor Portal (React) ────────────────────────────────
  doctor-portal:
    name: Doctor Portal (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/doctor-portal
    env:
      DISABLE_ESLINT_PLUGIN: "true"
      CI: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npm test -- --watchAll=false
      - run: npm run build

  # ─── Mobile (Flutter) ─────────────────────────────────────
  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter test

  # ─── Add new components below this line ───────────────────
  # Example:
  # admin-portal:
  #   name: Admin Portal
  #   runs-on: ubuntu-latest
  #   defaults:
  #     run:
  #       working-directory: web/admin-portal
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-node@v4
  #       with:
  #         node-version: 20
  #     - run: npm ci
  #     - run: npm run build

  # ─── Summary (must pass for branch protection) ────────────
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [backend, web, doctor-portal, mobile]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.web.result }}" != "success" ] || \
             [ "${{ needs.doctor-portal.result }}" != "success" ] || \
             [ "${{ needs.mobile.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
