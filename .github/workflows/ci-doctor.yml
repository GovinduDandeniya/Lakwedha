name: Doctor Portal CI

on:
  push:
    paths:
      - 'web/doctor-portal/**'
  pull_request:
    paths:
      - 'web/doctor-portal/**'

jobs:
  doctor:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web/doctor-portal

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 16

      - run: npm ci
      - run: npm test -- --watchAll=false
      - run: npm run build
        env:
          DISABLE_ESLINT_PLUGIN: "true"
